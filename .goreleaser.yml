---
project_name: eventbridge-cli

builds:
  - binary: eventbridge-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags: -s -w

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files: []
